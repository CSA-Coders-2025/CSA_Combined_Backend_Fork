<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layouts/base}" lang="en">

<head>
    <title>Rubric Grades</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.css" />
    <style>
        th, td {
            padding: 1em;
            text-align: center;
            vertical-align: top;
        }
        .rubric-cell {
            display: flex;
            flex-direction: column;
            gap: 0.4em;
        }
        .criterion {
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
<th:block layout:fragment="body" th:remove="tag">
    <h2>Rubric Grades</h2>

    <table id="rubric-table" class="table table-bordered">
        <thead>
            <tr>
                <th>Student</th>
                <th>Assignment</th>
                <th>Rubric Breakdown</th>
                <th>Total Score</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="rubricGrade : ${rubricGrades}">
                <td th:text="${rubricGrade.getStudent().name}">Student Name</td>
                <td th:text="${rubricGrade.getAssignment().name}">Assignment</td>
                <td>
                    <div class="rubric-cell">
                        <div th:each="entry : ${rubricGrade.rubricScores.entrySet()}">
                            <div class="criterion">
                                <span th:text="${entry.key}">Topic</span>
                                <span th:text="${entry.value.points} + ' × ' + ${entry.value.weightage}">0.8 × 0.25</span>
                            </div>
                        </div>
                    </div>
                </td>
                <td th:text="${rubricGrade.totalScore}">0.95</td>
            </tr>
        </tbody>
    </table>
</th:block>

<th:block layout:fragment="script" th:remove="tag">
<script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
<script>
    $(document).ready(() => {
        $('#rubric-table').DataTable();
    });
</script>
</th:block>

</body>
</html>
