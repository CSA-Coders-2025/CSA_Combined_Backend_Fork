<!DOCTYPE HTML>
<html xmlns:layout="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml"
      layout:decorate="~{layouts/base}" lang="en">

<head>
    <title>View Grades</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .scrollable-table {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        .grade-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5em;
        }
        .grade-input {
            width: 50px;
            padding: 5px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .column-search-container {
            margin-bottom: 15px;
            text-align: right;
        }
        #column-search {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>View Grades</h2>
    <button class="btn-primary" id="save-btn">Save Grades</button>
    <div class="scrollable-table">
        <form id="grade-form">
            <div class="column-search-container">
                <label for="column-search">Search Assignments: </label>
                <input type="text" id="column-search" placeholder="Search..." />
            </div>            
            <table id="edit-grades-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th:block th:each="assignment : ${assignments}">
                            <th>
                                <div>
                                    <strong th:text="${assignment.name}"></strong>
                                    <div class="small" th:text="'Out of ' + ${assignment.points}"></div>
                                </div>
                            </th>
                        </th:block>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.name}"></td>
                        <td th:each="assignment : ${assignments}">
                            <div class="grade-cell">
                                <input 
                                    type="number" min="0" step="any"
                                    class="grade-input"
                                    th:name="'grades[' + ${assignment.id} + '][' + ${student.id} + ']'" 
                                    th:value="${grades[assignment.id][student.id] != null ? grades[assignment.id][student.id] : ''}" 
                                    th:placeholder="${grades[assignment.id][student.id] != null ? '' : 'N/A'}"
                                />
                                <span>/</span>
                                <span th:text="${assignment.points}"></span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</div>
</body>
</html>
